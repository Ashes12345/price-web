
<!DOCTYPE html>

        .container{max-width:1200px;margin:0 auto;background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 12px #e2e8f0;}

        th{background:#4299e1;color:#fff;font-weight:normal;}
        tr:nth-child(even){background:#f7fafc;}
        tr:hover{background:#ebf8ff;transition:0.2s;}
        /* 移动端适配 */
        @media screen and (max-width:768px){
            body{padding:10px;}
            .container{padding:10px;}
